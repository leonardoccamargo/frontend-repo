<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Character Manager</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>RPG Character Manager</h1>
        
        <section class="form-section">
            <h2>Adicionar Novo Personagem</h2>
            <form id="personagemForm">
                <div class="form-group">
                    <label for="nome">Nome do Personagem:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                
                <div class="form-group">
                    <label for="classe">Classe:</label>
                    <input type="text" id="classe" name="classe" required>
                </div>
                
                <div class="form-group">
                    <label for="nivel">Nível:</label>
                    <input type="number" id="nivel" name="nivel" min="1" value="1">
                </div>
                
                <button type="submit" class="btn-submit">Adicionar Personagem</button>
            </form>
        </section>

        <section class="table-section">
            <h2>Personagens Cadastrados</h2>
            <table id="personagensTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Classe</th>
                        <th>Nível</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="personagensBody">
                    <!-- Dados serão inseridos aqui via JavaScript -->
                </tbody>
            </table>
            <p id="mensagem-lista"></p>
        </section>
    </div>

    <script src="./app.js"></script>
</body>
</html>
